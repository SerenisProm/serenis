<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Réalisations | Sérénis Développement</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-transition-overlay"></div>

    <header class="glassmorphism">
        <a href="index.html" class="logo">Sérénis Développement</a>
        <nav>
            <ul>
                <li><a href="index.html" class="nav-link">Accueil</a></li>
                <li><a href="index.html#a-propos" class="nav-link">À propos</a></li>
                <li class="dropdown">
                    <a href="realisations.html" class="nav-link">Réalisations ▾</a>
                    <ul class="dropdown-content" id="nav-projects-list">
                        <!-- Liste générée dynamiquement par le script -->
                    </ul>
                </li>
                <li><a href="index.html#contact" class="btn-contact magnetic-btn">Contact</a></li>
                <li><button id="theme-toggle-page" class="magnetic-btn">🌓</button></li>
            </ul>
        </nav>
    </header>

    <main class="projects-page">
        <h1 class="scroll-reveal">Nos Réalisations Immobilières</h1>
        
        <!-- Boutons de filtrage des projets -->
        <div class="tabs" id="project-tabs">
            <!-- Boutons générés dynamiquement en JS -->
        </div>

        <!-- Affichage dynamique du projet actif et de son carrousel -->
        <div id="project-details" class="project-details-container glassmorphism 3d-tilt-card scroll-reveal">
            <!-- Injecté via JS -->
        </div>
    </main>

    <!-- Visionneuse Lightbox Plein Écran -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <button class="lightbox-nav lightbox-prev" aria-label="Photo précédente">❮</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Aperçu plein écran">
        </div>
        <button class="lightbox-nav lightbox-next" aria-label="Photo suivante">❯</button>
    </div>

    <footer>
        <div class="footer-links">
            <a href="politique-confidentialite.html">Politique de confidentialité</a>
            <a href="mentions-legales.html">Mentions Légales</a>
            <a href="index.html#contact">Nous contacter</a>
        </div>
        <p>&copy; 2026 Sérénis Développement. Tous droits réservés.</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
