<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sérénis Développement — Administration</title>
  <!-- Import de la police du site -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="family">
  
  <!-- Script Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- Style personnalisé pour adapter l'interface à la charte Sérénis -->
  <style>
    /* Style de la page de connexion Netlify */
    body {
      font-family: 'Montserrat', sans-serif !important;
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 50%, #f1f5f9 100%) !important;
    }
    /* Bouton de connexion épuré */
    .nc-githubAuthenticationButton-button {
      background-color: #0f172a !important;
      border-radius: 30px !important;
      font-family: 'Montserrat', sans-serif !important;
      font-weight: 600 !important;
      transition: transform 0.3s ease !important;
    }
    .nc-githubAuthenticationButton-button:hover {
      transform: translateY(-2px) !important;
    }
    /* Masquer le volet de prévisualisation inutile à droite pour gagner de la place */
    .nc-entryEditor-previewPaneContainer {
      display: none !important;
    }
    /* Élargir la zone de saisie pour un confort maximal */
    .nc-entryEditor-controlPaneContainer {
      width: 100% !important;
      max-width: 800px !important;
      margin: 0 auto !important;
      padding: 20px !important;
    }
  </style>
</head>
<body>
</body>
</html>
