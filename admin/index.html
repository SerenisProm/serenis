<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sérénis Développement | Administration</title>

  <!-- Police Montserrat -->
  <link href="https://fonts.googleapis.com/css?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    body {
      font-family: 'Montserrat', sans-serif !important;
      background: #f8fafc !important;
    }

    /* Masquage de l'aperçu visuel à droite (inutile pour le JSON) */
    div[class="Pane2"],
    .nc-entryEditor-previewPaneContainer,
    [class*="previewPaneContainer"] {
      display: none !important;
    }

    /* Le formulaire prend toute la largeur disponible */
    div[class^="Pane1"],
    .nc-entryEditor-controlPaneContainer,
    [class*="controlPaneContainer"] {
      width: 100% !important;
      max-width: 900px !important;
      margin: 0 auto !important;
      padding: 30px 10px !important;
    }

    /* Design épuré pour les blocs de saisie */
    div[class^="ControlContainer"],
    [class*="ControlContainer"] {
      background: #ffffff !important;
      border: 1px solid #e2e8f0 !important;
      border-radius: 14px !important;
      padding: 20px !important;
      margin-bottom: 20px !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
    }

    /* Bouton de connexion aux couleurs de la charte */
    .nc-githubAuthenticationButton-button {
      background-color: #0f172a !important;
      border-radius: 30px !important;
      font-family: 'Montserrat', sans-serif !important;
      font-weight: 600 !important;
    }
  </style>
</head>

<body>
  <!-- Script du CMS Decap -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" defer></script>
</body>

</html>
