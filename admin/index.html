<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sérénis Développement — Administration</title>
  
  <!-- Police Montserrat du site -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- Le widget Identity pour la connexion -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* Style général épuré */
    body {
      font-family: 'Montserrat', sans-serif !important;
      background: #f8fafc !important; /* Fond gris très clair ultra propre */
    }

    /* 🚫 SUPPRESSION DE L'APERÇU VISUEL À DROITE */
    div[class^="Pane2"], 
    .nc-entryEditor-previewPaneContainer,
    [class*="previewPaneContainer"] {
      display: none !important;
    }

    /* 📐 LE FORMULAIRE PREND TOUTE LA LARGEUR ET SE CENTRE */
    div[class^="Pane1"],
    .nc-entryEditor-controlPaneContainer,
    [class*="controlPaneContainer"] {
      width: 100% !important;
      max-width: 850px !important;
      margin: 0 auto !important;
      padding: 30px 10px !important;
    }

    /* 🫧 DESIGN DES CHAMPS EN "BULLES" / BLOCS BLANCS ÉPURÉS */
    div[class^="ControlContainer"], 
    [class*="ControlContainer"] {
      background: #ffffff !important;
      border: 1px solid #e2e8f0 !important;
      border-radius: 14px !important;
      padding: 20px !important;
      margin-bottom: 20px !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
    }

    /* Bouton de connexion style Sérénis */
    .nc-githubAuthenticationButton-button {
      background-color: #0f172a !important;
      border-radius: 30px !important;
      font-family: 'Montserrat', sans-serif !important;
      font-weight: 600 !important;
    }
  </style>
</head>
<body>
  <!-- Chargement du CMS une fois le body prêt -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" defer></script>
</body>
</html>
