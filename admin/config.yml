backend:
  name: git-gateway
  branch: main

# Dossier où seront stockées tes photos glissées dans l'admin
media_folder: "images/uploads"
public_folder: "/images/uploads"

slug:
  clean_accents: true
  upper_case: false

collections:
  - name: "configuration"
    label: "⚙️ Gestion du Site"
    delete: false
    files:
      - file: "data/projects.json"
        label: "🏗️ Liste des Réalisations"
        name: "projects"
        fields:
          - name: "projectsList"
            label: "Vos Programmes Immobiliers"
            label_singular: "un projet"
            widget: "list"
            summary: '{{fields.title}} ({{fields.location}})'
            fields:
              # 1. Identifiant
              - {label: "🔗 Identifiant unique (ex: clos-saint-joseph)", name: "id", widget: "string", hint: "Sans espace ni accent. Permet de lier les onglets."}
              
              # 2. Nom
              - {label: "🏢 Nom de la résidence", name: "title", widget: "string"}
              
              # 3. Ville
              - {label: "📍 Ville (ex: Montpellier (34))", name: "location", widget: "string"}
              
              # 4. Description
              - {label: "📝 Description commerciale", name: "description", widget: "text"}
              
              # 5. Points clés (Features)
              - label: "✨ Points clés (Features)"
                name: "features"
                widget: "list"
                field: {label: "Élément à ajouter", widget: "string"}
              
              # 6. Photos en tête (À glisser)
              - label: "📸 Photos en tête (À glisser)"
                name: "images"
                widget: "list"
                field: {label: "Glisser une image", widget: "image"}
              
              # 7. En savoir plus (Une photo à glisser)
              - {label: "🖼️ En savoir plus (Une photo à glisser)", name: "moreInfoImage", widget: "image", required: false}