backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"
clean_accents: true

collections:
  - name: "configuration"
    label: "Gestion du Site"
    delete: false
    files:
      - file: "data/projects.json"
        label: "Programmes Immobiliers"
        name: "projects"
        fields:
          - name: "projectsList"
            label: "Nos Réalisations (Terminées)"
            label_singular: "une réalisation"
            widget: "list"
            summary: "{{fields.title}} ({{fields.location}})"
            fields:
              - {label: "Identifiant unique (ex: clos-saint-joseph)", name: "id", widget: "string"}
              - {label: "Nom de la résidence", name: "title", widget: "string"}
              - {label: "Ville", name: "location", widget: "string"}
              - {label: "Description commerciale", name: "description", widget: "text"}
              - label: "Points clés (Features)"
                name: "features"
                widget: "list"
                field: {label: "Élément", name: "item", widget: "string"}
              - label: "Photos en tête (À glisser)"
                name: "images"
                widget: "list"
                field: {label: "Image", name: "url", widget: "image"}
              - {label: "En savoir plus (Une photo)", name: "moreInfoImage", widget: "image", required: false}

          - name: "futureProjectsList"
            label: "Nos Projets en Cours (Futurs)"
            label_singular: "un projet en cours"
            widget: "list"
            summary: "{{fields.title}} ({{fields.location}})"
            fields:
              - {label: "Identifiant unique (ex: residence-avenir)", name: "id", widget: "string"}
              - {label: "Nom du projet", name: "title", widget: "string"}
              - {label: "Ville", name: "location", widget: "string"}
              - {label: "Description commerciale", name: "description", widget: "text"}
              - label: "Points clés (Features)", name: "features", widget: "list"
                field: {label: "Élément", name: "item", widget: "string"}
              - label: "Photos en tête (À glisser)", name: "images", widget: "list"
                field: {label: "Image", name: "url", widget: "image"}
              - {label: "En savoir plus (Une photo)", name: "moreInfoImage", widget: "image", required: false}